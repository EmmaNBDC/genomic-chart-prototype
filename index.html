<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Genomic Trait Prototype</title>

<style>
:root{
    --holstein-blue:#245986;
    --light-grey:#eeeeee;
    --line-grey:#d5d5d5;
}

body{
    font-family: Arial, sans-serif;
    margin:24px;
    color:#111;
    background:#fff;
}

h2{
    margin:0 0 18px 0;
}

button{
    padding:8px 12px;
    cursor:pointer;
    border:1px solid #888;
    background:#f7f7f7;
    border-radius:3px;
}

button:hover{
    background:#e9e9e9;
}

.layout{
    display:grid;
    grid-template-columns:380px 1fr;
    gap:26px;
    align-items:start;
}

.panel{
    border:1px solid #ccc;
    padding:18px;
    border-radius:8px;
    background:#f8f8f8;
}

.control-row{
    margin-bottom:14px;
}

label{
    font-weight:bold;
    display:block;
    margin-bottom:5px;
}

input{
    padding:6px;
    width:100%;
    box-sizing:border-box;
}

input[type="color"]{
    height:38px;
}

.checkbox-label{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:bold;
}

.checkbox-label input{
    width:auto;
    padding:0;
}

.button-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin:14px 0;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th, td{
    border:1px solid #ccc;
    padding:6px;
    font-size:13px;
}

th{
    background:var(--holstein-blue);
    color:white;
}

td input{
    border:0;
    padding:4px;
}

.chart-wrapper{
    width:100%;
    max-width:1050px;
}

.section-title{
    display:grid;
    grid-template-columns:200px 200px 1fr 80px;
    background:var(--holstein-blue);
    color:white;
    font-weight:bold;
    font-size:13px;
    margin-top:10px;
}

.section-title div{
    padding:5px 7px;
    border-right:1px solid white;
}

.summary-row{
    display:grid;
    grid-template-columns:200px 200px 1fr 80px;
    font-size:13px;
    border-left:1px solid var(--line-grey);
    border-right:1px solid var(--line-grey);
    border-bottom:1px solid var(--line-grey);
}

.summary-row div{
    padding:5px 7px;
}

.scale{
    display:grid;
    grid-template-columns:90px 86px 78px 1fr 78px 58px;
    background:var(--holstein-blue);
    color:white;
    font-weight:bold;
    font-size:12px;
    margin-top:6px;
}

.scale div{
    padding:4px 6px;
    border-right:1px solid white;
}

.scale-bar{
    display:flex;
    justify-content:space-between;
}

.chart-row{
    display:grid;
    grid-template-columns:90px 86px 78px 1fr 78px 58px;
    align-items:center;
    font-size:12px;
    border-bottom:1px solid var(--line-grey);
    min-height:20px;
}

.chart-row > div{
    padding:3px 6px;
}

.bar-container{
    position:relative;
    height:18px;
    background:var(--light-grey);
    padding:0 !important;
}

.zero-line{
    position:absolute;
    left:50%;
    top:0;
    bottom:0;
    width:2px;
    background:#555;
    z-index:2;
}

.bar{
    position:absolute;
    top:4px;
    height:10px;
    z-index:1;
}

.chart-row .value{
    text-align:right;
}

#editDataPanel{
    display:none;
    margin-top:14px;
    max-height:420px;
    overflow:auto;
}

.small-note{
    font-size:12px;
    color:#555;
    margin-top:8px;
}
</style>
</head>

<body>

<h2>Genomic Type Prototype</h2>

<div class="layout">

    <div class="panel">
        <h3>Controls</h3>

        <div class="control-row">
            <label>Positive colour</label>
            <input type="color" id="positiveColour" value="#f0ce3d">
        </div>

        <div class="control-row">
            <label>Negative colour</label>
            <input type="color" id="negativeColour" value="#4f6f8b">
        </div>

        <div class="control-row">
            <label class="checkbox-label">
                <input type="checkbox" id="useGradient" checked>
                Use gradient
            </label>
        </div>

        <div class="control-row">
            <label>Gradient change strength</label>
            <input type="range" id="gradientStrength" min="0" max="1" step="0.05" value="0.75">
        </div>

        <div class="control-row">
            <label class="checkbox-label">
                <input type="checkbox" id="reverseGradient">
                Strongest colour at zero
            </label>
        </div>

        <div class="button-row">
            <button onclick="loadExample()">Load Rimrock Example</button>
            <button onclick="undoChange()">Undo</button>
            <button onclick="resetDesign()">Reset Design</button>
        </div>

        <div class="control-row">
            <label>Upload Type CSV</label>
            <input type="file" id="csvUpload" accept=".csv">
            <div class="small-note">
                CSV should include columns: Trait, Value, LeftLabel, RightLabel
            </div>
        </div>

        <div class="button-row">
            <button onclick="toggleEditData()">✏️ Edit Type Data</button>
            <button onclick="addTrait()">Add trait</button>
        </div>

        <div id="editDataPanel">
            <h3>Type Trait Data</h3>

            <table id="traitTable">
                <thead>
                    <tr>
                        <th>Trait</th>
                        <th>Value</th>
                        <th>Left label</th>
                        <th>Right label</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <div class="button-row">
                <button onclick="saveData()">Save Type Data</button>
            </div>
        </div>
    </div>

    <div class="chart-wrapper">

        <div class="section-title">
            <div>Holstein Type</div>
            <div>Interbull Type Proof</div>
            <div>PTAT2026 (4/26)</div>
            <div></div>
        </div>

        <div class="summary-row">
            <div>TM&nbsp;&nbsp;&nbsp; <strong>2.88</strong></div>
            <div>89% Rlb</div>
            <div>Daughters (UK)&nbsp;&nbsp;119&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Herds (UK)&nbsp;&nbsp;20</div>
            <div></div>
        </div>

        <div class="scale">
            <div>Trait</div>
            <div></div>
            <div>-3</div>
            <div class="scale-bar">
                <span>-2</span>
                <span>-1</span>
                <span>0</span>
                <span>+1</span>
                <span>+2</span>
                <span>+3</span>
            </div>
            <div></div>
            <div>Value</div>
        </div>

        <div id="chart"></div>

    </div>

</div>

<script>
const defaultTraits = [
    {name:"Type Merit", value:2.88, left:"Poor", right:"Excellent"},
    {name:"Mammary", value:2.19, left:"Poor", right:"Excellent"},
    {name:"Legs & Feet", value:2.37, left:"Poor", right:"Excellent"},
    {name:"Stature", value:-0.21, left:"Short", right:"Tall"},
    {name:"Chest width", value:1.60, left:"Narrow", right:"Wide"},
    {name:"Body depth", value:0.87, left:"Shallow", right:"Deep"},
    {name:"Rib Structure", value:0.90, left:"Tight Ribbed", right:"Open Rib"},
    {name:"Rump angle", value:-1.25, left:"High pins", right:"Low pins"},
    {name:"Rump width", value:2.20, left:"Narrow", right:"Wide"},
    {name:"Rear leg side", value:0.98, left:"Straight", right:"Sickled"},
    {name:"Foot angle", value:0.63, left:"Low", right:"Steep"},
    {name:"Fore udd att", value:1.33, left:"Loose", right:"Tight"},
    {name:"Rear udder ht", value:1.60, left:"Very low", right:"Very high"},
    {name:"Udder supp", value:0.60, left:"Broken", right:"Strong"},
    {name:"Udder depth", value:0.75, left:"Below hock", right:"20cm above"},
    {name:"Front teat pl", value:0.58, left:"Outside", right:"Close"},
    {name:"Teat length", value:1.47, left:"Short", right:"Long"},
    {name:"Rear teat pl", value:-0.38, left:"Apart", right:"Close"},
    {name:"Teat pos side", value:0.08, left:"Close", right:"Apart"},
    {name:"Temperament", value:0.08, left:"Poor", right:"Good"},
    {name:"Ease of milk", value:1.09, left:"Slow", right:"Fast"},
    {name:"Locomotion", value:2.80, left:"Poor", right:"Excellent"},
    {name:"CondScore", value:0.37, left:"Low", right:"High"}
];

let traits = JSON.parse(JSON.stringify(defaultTraits));
let undoStack = [];

function saveUndo(){
    undoStack.push(JSON.stringify(traits));

    if(undoStack.length > 20){
        undoStack.shift();
    }
}

function undoChange(){
    if(undoStack.length === 0){
        alert("Nothing to undo");
        return;
    }

    traits = JSON.parse(undoStack.pop());
    renderTable();
    renderChart();
}

function loadExample(){
    saveUndo();
    traits = JSON.parse(JSON.stringify(defaultTraits));
    renderTable();
    renderChart();
}

function resetDesign(){
    document.getElementById("positiveColour").value = "#f0ce3d";
    document.getElementById("negativeColour").value = "#4f6f8b";
    document.getElementById("useGradient").checked = true;
    document.getElementById("gradientStrength").value = 0.75;
    document.getElementById("reverseGradient").checked = false;
    renderChart();
}

function toggleEditData(){
    const panel = document.getElementById("editDataPanel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
}

function saveData(){
    renderChart();
    document.getElementById("editDataPanel").style.display = "none";
}

function hexToRgb(hex){
    const bigint = parseInt(hex.slice(1), 16);
    return {
        r:(bigint >> 16) & 255,
        g:(bigint >> 8) & 255,
        b:bigint & 255
    };
}

function getGradient(value){
    const positiveColour = hexToRgb(document.getElementById("positiveColour").value);
    const negativeColour = hexToRgb(document.getElementById("negativeColour").value);

    const useGradient = document.getElementById("useGradient").checked;
    const reverseGradient = document.getElementById("reverseGradient").checked;
    const strength = parseFloat(document.getElementById("gradientStrength").value);

    const colour = value >= 0 ? positiveColour : negativeColour;

    const weakOpacity = 0.18;
    const strongOpacity = Math.min(1, 0.18 + strength);

    const weak = `rgba(${colour.r}, ${colour.g}, ${colour.b}, ${weakOpacity})`;
    const strong = `rgba(${colour.r}, ${colour.g}, ${colour.b}, ${strongOpacity})`;

    if(!useGradient){
        return strong;
    }

    if(value >= 0){
        return reverseGradient
            ? `linear-gradient(to right, ${strong}, ${weak})`
            : `linear-gradient(to right, ${weak}, ${strong})`;
    } else {
        return reverseGradient
            ? `linear-gradient(to left, ${strong}, ${weak})`
            : `linear-gradient(to left, ${weak}, ${strong})`;
    }
}

function renderTable(){
    const tbody = document.querySelector("#traitTable tbody");
    tbody.innerHTML = "";

    traits.forEach((trait, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td><input value="${trait.name}" onchange="updateTrait(${index}, 'name', this.value)"></td>
            <td><input type="number" step="0.01" min="-3" max="3" value="${trait.value}" onchange="updateTrait(${index}, 'value', this.value)"></td>
            <td><input value="${trait.left}" onchange="updateTrait(${index}, 'left', this.value)"></td>
            <td><input value="${trait.right}" onchange="updateTrait(${index}, 'right', this.value)"></td>
        `;

        tbody.appendChild(row);
    });
}

function renderChart(){
    const chart = document.getElementById("chart");
    chart.innerHTML = "";

    traits.forEach(trait => {
        const value = Math.max(-3, Math.min(3, parseFloat(trait.value) || 0));
        const width = Math.abs(value) / 3 * 50;
        const colour = getGradient(value);

        const row = document.createElement("div");
        row.className = "chart-row";

        row.innerHTML = `
            <div>${trait.name}</div>
            <div>${trait.left}</div>
            <div></div>

            <div class="bar-container">
                <div class="zero-line"></div>
                <div class="bar"
                    style="
                    background:${colour};
                    width:${width}%;
                    ${value >= 0 ? `left:50%;` : `left:${50-width}%;`}
                    ">
                </div>
            </div>

            <div>${trait.right}</div>
            <div class="value">${formatValue(value)}</div>
        `;

        chart.appendChild(row);
    });
}

function formatValue(value){
    return Number.isInteger(value) ? value.toString() : value.toFixed(2).replace(/0$/, "").replace(/\.00$/, "");
}

function updateTrait(index, field, value){
    saveUndo();
    traits[index][field] = field === "value" ? parseFloat(value) : value;
    renderChart();
}

function addTrait(){
    saveUndo();

    traits.push({
        name:"New trait",
        value:0,
        left:"Low",
        right:"High"
    });

    renderTable();
    renderChart();
    document.getElementById("editDataPanel").style.display = "block";
}

function parseCSVLine(line){
    const result = [];
    let current = "";
    let insideQuotes = false;

    for(let i = 0; i < line.length; i++){
        const char = line[i];

        if(char === '"' && line[i + 1] === '"'){
            current += '"';
            i++;
        } else if(char === '"'){
            insideQuotes = !insideQuotes;
        } else if(char === "," && !insideQuotes){
            result.push(current.trim());
            current = "";
        } else {
            current += char;
        }
    }

    result.push(current.trim());
    return result;
}

function handleCSVUpload(event){
    const file = event.target.files[0];

    if(!file){
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){
        const text = e.target.result;
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");

        if(lines.length < 2){
            alert("CSV appears to be empty");
            return;
        }

        const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase().replace(/\s/g, ""));

        const traitIndex = headers.indexOf("trait");
        const valueIndex = headers.indexOf("value");
        const leftIndex = headers.indexOf("leftlabel");
        const rightIndex = headers.indexOf("rightlabel");

        if(traitIndex === -1 || valueIndex === -1 || leftIndex === -1 || rightIndex === -1){
            alert("CSV needs columns: Trait, Value, LeftLabel, RightLabel");
            return;
        }

        saveUndo();

        traits = lines.slice(1).map(line => {
            const cols = parseCSVLine(line);

            return {
                name: cols[traitIndex],
                value: parseFloat(cols[valueIndex]),
                left: cols[leftIndex],
                right: cols[rightIndex]
            };
        }).filter(t => t.name && !isNaN(t.value));

        renderTable();
        renderChart();
    };

    reader.readAsText(file);
}

document.getElementById("positiveColour").addEventListener("input", renderChart);
document.getElementById("negativeColour").addEventListener("input", renderChart);
document.getElementById("gradientStrength").addEventListener("input", renderChart);
document.getElementById("useGradient").addEventListener("change", renderChart);
document.getElementById("reverseGradient").addEventListener("change", renderChart);
document.getElementById("csvUpload").addEventListener("change", handleCSVUpload);

renderTable();
renderChart();
</script>

</body>
</html>
