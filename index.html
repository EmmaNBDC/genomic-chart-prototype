<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Genomic Trait Prototype</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:30px;
    color:#111;
}

h2{
    margin-bottom:20px;
}

.layout{
    display:grid;
    grid-template-columns:420px 1fr;
    gap:35px;
    align-items:start;
}

.panel{
    border:1px solid #ccc;
    padding:18px;
    border-radius:8px;
    background:#f8f8f8;
}

.control-row{
    margin-bottom:14px;
}

label{
    font-weight:bold;
    display:block;
    margin-bottom:4px;
}

input{
    padding:6px;
    width:100%;
    box-sizing:border-box;
}

input[type="color"]{
    height:38px;
}

.checkbox-label{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:bold;
}

.checkbox-label input{
    width:auto;
    padding:0;
}

button{
    padding:8px 14px;
    cursor:pointer;
    margin-top:8px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    background:white;
}

th, td{
    border:1px solid #ccc;
    padding:6px;
    font-size:13px;
}

td input{
    border:0;
    padding:4px;
}

.chart-row{
    display:grid;
    grid-template-columns:140px 90px 520px 90px 60px;
    align-items:center;
    margin:7px 0;
    font-size:14px;
}

.bar-container{
    position:relative;
    height:20px;
    background:#eee;
}

.zero-line{
    position:absolute;
    left:50%;
    top:0;
    bottom:0;
    width:2px;
    background:#555;
}

.bar{
    position:absolute;
    top:2px;
    height:16px;
}

.scale{
    display:grid;
    grid-template-columns:140px 90px 520px 90px 60px;
    font-size:12px;
    margin-bottom:6px;
    color:#555;
}

.scale-bar{
    display:flex;
    justify-content:space-between;
}
</style>
</head>

<body>

<h2>Genomic Type Prototype</h2>

<div class="layout">

<div class="panel">
    <h3>Controls</h3>

<div class="control-row">
    <label>Positive colour</label>
    <input type="color" id="positiveColour" value="#1f77c9">
</div>

<div class="control-row">
    <label>Negative colour</label>
    <input type="color" id="negativeColour" value="#8aaac5">
</div>

<div class="control-row">
    <label class="checkbox-label">
        <input type="checkbox" id="useGradient" checked>
        Use gradient
    </label>
</div>

<div class="control-row">
    <label>Gradient change strength</label>
    <input type="range" id="gradientStrength" min="0" max="1" step="0.05" value="0.8">
</div>

<div class="control-row">
    <label class="checkbox-label">
        <input type="checkbox" id="reverseGradient">
        Strongest colour at zero
    </label>
</div>

<button onclick="addTrait()">Add trait</button>

    <button onclick="toggleEditData()" id="editDataBtn">✏️ Edit Data</button>

<div id="editDataPanel" style="display:none;">
    <h3>Trait Data</h3>

    <table id="traitTable">
    <thead>
        <tr>
            <th>Trait</th>
            <th>Value</th>
            <th>Left label</th>
            <th>Right label</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<button onclick="saveData()">Save Data</button>
</div>

</div>

<div>
    <div class="scale">
        <div></div>
        <div></div>
        <div class="scale-bar">
            <span>-3</span>
            <span>-2</span>
            <span>-1</span>
            <span>0</span>
            <span>+1</span>
            <span>+2</span>
            <span>+3</span>
        </div>
        <div></div>
        <div></div>
    </div>

    <div id="chart"></div>
</div>

</div>

<script>
let traits = [
    {name:"Type Merit", value:2.88, left:"Poor", right:"Excellent"},
    {name:"Mammary", value:2.19, left:"Poor", right:"Excellent"},
    {name:"Legs & Feet", value:2.37, left:"Poor", right:"Excellent"},
    {name:"Stature", value:-0.21, left:"Short", right:"Tall"},
    {name:"Chest width", value:1.6, left:"Narrow", right:"Wide"},
    {name:"Body depth", value:0.87, left:"Shallow", right:"Deep"}
];

function hexToRgb(hex){
    const bigint = parseInt(hex.slice(1), 16);
    return {
        r:(bigint >> 16) & 255,
        g:(bigint >> 8) & 255,
        b:bigint & 255
    };
}

function getColour(value){
    const positiveColour = hexToRgb(document.getElementById("positiveColour").value);
    const negativeColour = hexToRgb(document.getElementById("negativeColour").value);
    const strength = parseFloat(document.getElementById("gradientStrength").value);

    const colour = value >= 0 ? positiveColour : negativeColour;
    const intensity = Math.abs(value) / 3;
    const opacity = 0.15 + (intensity * strength);

    return `rgba(${colour.r}, ${colour.g}, ${colour.b}, ${opacity})`;
}

function getGradient(value){
    const positiveColour = hexToRgb(document.getElementById("positiveColour").value);
    const negativeColour = hexToRgb(document.getElementById("negativeColour").value);

    const useGradient = document.getElementById("useGradient").checked;
    const reverseGradient = document.getElementById("reverseGradient").checked;
    const strength = parseFloat(document.getElementById("gradientStrength").value);

    const colour = value >= 0 ? positiveColour : negativeColour;

    const weakOpacity = 0.15;
    const strongOpacity = 0.15 + strength;

    const weak = `rgba(${colour.r}, ${colour.g}, ${colour.b}, ${weakOpacity})`;
    const strong = `rgba(${colour.r}, ${colour.g}, ${colour.b}, ${strongOpacity})`;

    if(!useGradient){
        return strong;
    }

    if(value >= 0){
        return reverseGradient
            ? `linear-gradient(to right, ${strong}, ${weak})`
            : `linear-gradient(to right, ${weak}, ${strong})`;
    } else {
        return reverseGradient
            ? `linear-gradient(to left, ${strong}, ${weak})`
            : `linear-gradient(to left, ${weak}, ${strong})`;
    }
}

function toggleEditData(){
    const panel = document.getElementById("editDataPanel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
}

function saveData(){
    renderChart();
    document.getElementById("editDataPanel").style.display = "none";
}
    
function renderTable(){
    const tbody = document.querySelector("#traitTable tbody");
    tbody.innerHTML = "";

    traits.forEach((trait, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td><input value="${trait.name}" onchange="updateTrait(${index}, 'name', this.value)"></td>
            <td><input type="number" step="0.01" min="-3" max="3" value="${trait.value}" onchange="updateTrait(${index}, 'value', this.value)"></td>
            <td><input value="${trait.left}" onchange="updateTrait(${index}, 'left', this.value)"></td>
            <td><input value="${trait.right}" onchange="updateTrait(${index}, 'right', this.value)"></td>
        `;

        tbody.appendChild(row);
    });
}

function renderChart(){
    const chart = document.getElementById("chart");
    chart.innerHTML = "";

    traits.forEach(trait => {
        const value = Math.max(-3, Math.min(3, parseFloat(trait.value) || 0));
        const width = Math.abs(value) / 3 * 260;
        const colour = getGradient(value);

        const row = document.createElement("div");
        row.className = "chart-row";

        row.innerHTML = `
            <div>${trait.name}</div>
            <div>${trait.left}</div>

            <div class="bar-container">
                <div class="zero-line"></div>
                <div class="bar"
                    style="
                    background:${colour};
                    width:${width}px;
                    ${value >= 0 ? `left:260px;` : `left:${260-width}px;`}
                    ">
                </div>
            </div>

            <div>${trait.right}</div>
            <div>${value.toFixed(2)}</div>
        `;

        chart.appendChild(row);
    });
}

function updateTrait(index, field, value){
    traits[index][field] = field === "value" ? parseFloat(value) : value;
    renderChart();
}

function addTrait(){
    traits.push({
        name:"New trait",
        value:0,
        left:"Low",
        right:"High"
    });

    renderTable();
    renderChart();
}

document.getElementById("positiveColour").addEventListener("input", renderChart);
document.getElementById("negativeColour").addEventListener("input", renderChart);
document.getElementById("gradientStrength").addEventListener("input", renderChart);
document.getElementById("useGradient").addEventListener("change", renderChart);
document.getElementById("reverseGradient").addEventListener("change", renderChart);

renderTable();
renderChart();
</script>

</body>
</html>
